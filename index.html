    <!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ақ Мерейім ❤️</title>

<style>

*{
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffe6eb,#fff);
    overflow:hidden;
}


.card{
    display:none;
    background:white;
    padding:40px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.1);
    width:90%;
    max-width:450px;
}


h1{
    font-size:40px;
    color:#ff4d6d;
}


p{
    font-size:20px;
    color:#555;
    min-height:30px;
}


button{
    border:none;
    padding:15px 35px;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
    margin:15px;
    transition:.3s;
}


#yes{
    background:#ff4d6d;
    color:white;
}


#no{
    background:#ddd;
    position:absolute;
}


button:hover{
    transform:scale(1.05);
}


.heart{
    position:absolute;
    font-size:25px;
    animation:fly 3s linear forwards;
}


@keyframes fly{

0%{
    transform:translateY(0) scale(1);
    opacity:1;
}

100%{
    transform:translateY(-700px) scale(2);
    opacity:0;
}

}


.final{
    font-size:35px;
    color:#ff4d6d;
    animation:appear 1s;
}


@keyframes appear{
from{
opacity:0;
transform:scale(.5);
}

to{
opacity:1;
transform:scale(1);
}

}
.envelope{
    width:90%;
    max-width:500px;
    height:80vh;
    background:#fff;
    position:relative;
    margin:auto;
    border-radius:10px;
    box-shadow:0 15px 40px rgba(0,0,0,.15);
}


.envelope:before{
    content:"";
    position:absolute;
    top:0;
    left:50%;
    transform:translateX(-50%);
    border-left:250px solid transparent;
    border-right:250px solid transparent;
    border-top:100px solid #ffd6df;
    transform-origin:top;
    animation:flap 1.5s forwards;
}


.paper{
    position:absolute;
    width:90%;
    height:85%;
    background:white;
    left:5%;
    bottom:10px;
    border-radius:10px;
    padding:20px;
    overflow-y:auto;
    opacity:0;
    animation:paperUp 2s 1s forwards;
}


@keyframes flap{
    from{
        transform:rotateX(0deg);
    }
    to{
        transform:rotateX(180deg);
    }
}


@keyframes paperUp{

from{
    transform:translateY(100px);
    opacity:0;
}

to{
    transform:translateY(-40px);
    opacity:1;
}

}


.letterText{
    opacity:0;
    animation:textShow 3s 2s forwards;
}


@keyframes textShow{
from{
opacity:0;
}

to{
opacity:1;
}
}
    
#loading{
    position:fixed;
    width:100%;
    height:100%;
    background:linear-gradient(135deg,#ffe6eb,#fff);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:10;
}


#loading button{
    background:#ff4d6d;
    color:white;
}


.fade{
    animation:fade 1s forwards;
}


@keyframes fade{

from{
opacity:1;
}

to{
opacity:0;
}

}


.progress-hearts{
    font-size:30px;
    margin:20px;
    letter-spacing:5px;
}

.progress-hearts::after{
    content:"";
    animation:loadingHeart 5s linear infinite;
}


@keyframes loadingHeart{

0%{
content:"❤️";
}

20%{
content:"❤️❤️";
}

40%{
content:"❤️❤️❤️❤️";
}

60%{
content:"❤️❤️❤️❤️❤️❤️";
}

80%{
content:"❤️❤️❤️❤️❤️❤️❤️❤️";
}

100%{
content:"❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️";
}

}


@keyframes heartLoad{

0%{
    transform:scale(1);
    opacity:.5;
}

50%{
    transform:scale(1.2);
    opacity:1;
}

100%{
    transform:scale(1);
    opacity:.5;
}

}
</style>

</head>


<body>
    
<div id="loading">

<h1>Ақ Мерейім ❤️</h1>

<p id="loadText">
Қанекей, мені басшы ❤️
</p>


<div class="progress-hearts">
❤️ ❤️ ❤️ ❤️ ❤️ ❤️ ❤️ ❤️ ❤️ ❤️
</div>


<button onclick="startLove()">
Басайын ❤️
</button>

</div>

<div class="card">

<h1>Ақ Мерейім ❤️</h1>

<p id="text">
Жаным менің махаббатым...
Егер жүрегіңе ауыр тиген сөзім немесе ісім болса,
мені кешірші ❤️
</p>


<button id="yes">
Иә ❤️
</button>

<button id="no">
Жоқ
</button>


</div>



<script>


let no=document.getElementById("no");
let yes=document.getElementById("yes");
let text=document.getElementById("text");


let messages=[
"Ой, Ақ Мерейім... қойшы 🥺",
"Менің майжүрегім, ренжімеші ❤️",
"Сенің көңілің мен үшін өте маңызды",
"Мен сені ешқашан әдейі ренжіткім келмейді",
"Ақ Мерейім, жоқ батырмасы қашып кете берді ғой 😄",
"Сенің күлкіңді қайта көргім келеді ❤️"
];


let count=0;


no.onclick=function(){

let x=Math.random()*300-150;
let y=Math.random()*300-150;


no.style.transform=
`translate(${x}px,${y}px)`;


text.innerHTML=
messages[count%messages.length];


count++;

}



yes.onclick=function(){

document.querySelector(".card").innerHTML=
`

<div class="envelope">

<div class="paper">

<h2>
Ақ Мерейім❤️
</h2>

<p class="letterText">

Мен сені кездестірмес бұрын да армандарым болды.
Мақсаттарым болды.
Бірақ сол армандарымның ішіндегі ең әдемісі — сен екенсің.

<br><br>

Бір Алла ғана біздің алдымызда не күтіп тұрғанын біледі.
Алла қаласа, әрбір қуанышымды,
әрбір жеңісімді,
әрбір күнімді сенімен бөліскім келеді.

<br><br>

Мен саған мінсіз адам боламын деп уәде бере алмаймын.
Бірақ сені түсіну үшін,
сені бақытты ету үшін әрдайым тырысамын.

<br><br>

Сенің ренішіңді де, наздарыңды да түсінуге тырысамын.
Себебі сенің жүрегің мен үшін өте маңызды.

<br><br>

Сені жақсы көруді тоқтатпаймын.
<br>
Сені тыңдауды тоқтатпаймын.
<br>
Сені аялауды тоқтатпаймын.

<br><br>

Өйткені сен — менің Ақ Мерейімсің ❤️

<br><br>

Алла қаласа, бір күні «жаным» деген сөзді телефон арқылы емес,
әр таң сайын жаныңда тұрып айтқым келеді.

<br><br>

Алланың разылығы үшін сүйемін сені,
Мерейлі Ақ Мерейім ❤️

</p>

</div>

</div>

`;



for(let i=0;i<80;i++){

let heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.bottom="0px";
heart.style.animationDuration=
(2+Math.random()*3)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},4000);

}

}


function startLove(){


for(let i=0;i<30;i++){

let h=document.createElement("div");
h.innerHTML="❤️";
h.className="heart";

h.style.left=Math.random()*100+"vw";
h.style.bottom="0px";

document.body.appendChild(h);

setTimeout(()=>{
h.remove();
},3000);

}


let loading=document.getElementById("loading");
let text=document.getElementById("loadText");

let words=[
"Сен басып қойдың ғой 😳❤️",
"Жүрек дайындалып жатыр...",
"Кішкентай тосынсый жүктелуде ✨",
"Ақ Мерейімнің күлкі режимі қосылды 😊",
"Барлығы сен үшін дайын ❤️"
];

let i=0;


let timer=setInterval(()=>{

text.innerHTML=words[i];

i++;


if(i==words.length){

clearInterval(timer);

loading.classList.add("fade");


setTimeout(()=>{

loading.style.display="none";
document.querySelector(".card").style.display="block";

},1000);

}

},1000);



}

</script>


</body>
</html>
